<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Pay - UPI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0078d7, #00c6ff);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      animation: fadeInDown 1s ease;
    }

    p {
      font-size: 16px;
      margin-bottom: 25px;
      animation: fadeInDown 1.2s ease;
    }

    .quick-pay {
      background-color: #28a745;
      padding: 14px 30px;
      color: white;
      font-size: 18px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      animation: fadeInUp 1.5s ease;
      transition: all 0.3s ease;
    }

    .quick-pay:hover {
      background-color: #1e7e34;
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    footer{
      position:absolute;
      bottom: 0px;
      justify-content: center;;
    }
  </style>
</head>
<body>

  <h1>Instant UPI Payment</h1>
  <p>Click below to pay securely using UPI</p>

  <!-- Quick Pay Button -->
  <a class="quick-pay" href="upi://pay?pa=7337560874@superyes&pn=Rajesh%20Davala" target="_blank">
    💳 Quick Pay
  </a>
<footer>THANKS FOR VISITING </footer>
</body>
</html>
